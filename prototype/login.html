<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — 校园轻集市</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #ECF5FF 0%, #F5F7FA 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-wrapper { width: 420px; }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-size: 28px; font-weight: 700; color: #303133; margin-bottom: 8px; }
    .login-header p { font-size: 14px; color: #909399; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .login-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #909399; }
    .login-footer a { color: #409EFF; text-decoration: none; }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-wrapper">
      <div class="login-header">
        <h1>🎓 校园轻集市</h1>
        <p>轻量、可信、面向校园生活</p>
      </div>

      <div class="login-card">
        <h2 style="font-size:20px;font-weight:700;margin-bottom:24px;text-align:center;">登录账号</h2>
        <el-form size="large">
          <el-form-item>
            <el-input v-model="form.email" placeholder="请输入学号或邮箱" :prefix-icon="User" />
          </el-form-item>
          <el-form-item>
            <el-input v-model="form.password" type="password" placeholder="请输入密码" :prefix-icon="Lock" show-password />
          </el-form-item>
          <el-form-item>
            <div style="display:flex;justify-content:space-between;width:100%;font-size:13px;">
              <el-checkbox v-model="form.remember">记住我</el-checkbox>
              <a href="#" style="color:#409EFF;text-decoration:none;">忘记密码？</a>
            </div>
          </el-form-item>
          <el-button type="primary" size="large" style="width:100%;" @click="login">登 录</el-button>
        </el-form>

        <div style="text-align:center;margin-top:24px;font-size:14px;color:#909399;">
          还没有账号？<a href="register.html" style="color:#409EFF;">立即注册</a>
        </div>
      </div>

      <div class="login-footer">
        <a href="home.html">← 返回首页</a>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue
    const app = createApp({
      data() {
        return {
          User: ElementPlusIconsVue.User, Lock: ElementPlusIconsVue.Lock,
          form: { email:'', password:'', remember: false },
        }
      },
      methods: {
        login() {
          if (!this.form.email || !this.form.password) { this.$message.warning('请填写完整信息'); return; }
          this.$message.success('登录成功（演示）'); setTimeout(() => { window.location = 'home.html'; }, 800);
        }
      }
    })
    app.use(ElementPlus); app.mount('#app')
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号设置 — 校园轻集市</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F5F7FA; color: #303133; }
    .app-header { height: 60px; background: #fff; border-bottom: 1px solid #E4E7ED; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand .logo { font-size: 20px; font-weight: 700; color: #303133; text-decoration: none; }
    .brand .slogan { font-size: 13px; color: #909399; }
    .nav-links { display: flex; gap: 24px; align-items: center; list-style: none; }
    .nav-links a { text-decoration: none; color: #606266; font-size: 14px; }
    .nav-links a:hover { color: #409EFF; }
    .nav-publish { padding: 6px 18px; background: #409EFF; color: #fff !important; border-radius: 8px; font-weight: 600; }
    .main-container { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; }
    .side-card { background: #fff; border-radius: 12px; border: 1px solid #E4E7ED; overflow: hidden; }
    .user-header { padding: 28px 24px; text-align: center; background: linear-gradient(135deg, #ECF5FF, #F0F7FF); }
    .user-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #409EFF; }
    .side-menu { padding: 8px 0; }
    .side-menu a { display: flex; align-items: center; gap: 10px; padding: 12px 24px; text-decoration: none; color: #606266; font-size: 14px; }
    .side-menu a:hover, .side-menu a.active { background: #ECF5FF; color: #409EFF; }
    .main-card { background: #fff; border-radius: 12px; border: 1px solid #E4E7ED; padding: 24px; margin-bottom: 20px; }
    @media (max-width: 768px) { .profile-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand"><a href="home.html" class="logo">🎓 校园轻集市</a><span class="slogan">轻量、可信、面向校园生活</span></div>
      <ul class="nav-links">
        <li><a href="home.html">首页</a></li><li><a href="category.html">分类浏览</a></li>
        <li><a href="messages.html">消息<el-badge :value="3" :max="99" style="margin-left:2px;"/></a></li>
        <li><a href="profile.html">我的</a></li>
        <li><a href="publish.html" class="nav-publish">✍️ 发布信息</a></li>
      </ul>
    </header>

    <main class="main-container">
      <el-breadcrumb separator="/" style="margin-bottom:20px;">
        <el-breadcrumb-item :to="{ path: 'home.html' }">首页</el-breadcrumb-item>
        <el-breadcrumb-item :to="{ path: 'profile.html' }">个人中心</el-breadcrumb-item>
        <el-breadcrumb-item>账号设置</el-breadcrumb-item>
      </el-breadcrumb>

      <div class="profile-layout">
        <aside>
          <div class="side-card">
            <div class="user-header"><img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=160" class="user-avatar" /><div style="font-weight:700;margin-top:8px;">计算机学院小明</div></div>
            <div class="side-menu">
              <a href="profile.html"><el-icon><User /></el-icon>个人主页</a>
              <a href="my-posts.html"><el-icon><List /></el-icon>我的发布</a>
              <a href="favorites.html"><el-icon><Star /></el-icon>我的收藏</a>
              <a href="settings.html" class="active"><el-icon><Setting /></el-icon>账号设置</a>
            </div>
          </div>
        </aside>

        <div>
          <!-- 基本资料 -->
          <div class="main-card">
            <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;">👤 基本资料</h3>
            <el-form label-position="top" size="large">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <el-form-item label="昵称"><el-input v-model="profile.nickname" /></el-form-item>
                <el-form-item label="学院"><el-select v-model="profile.dept" style="width:100%"><el-option label="计算机科学与技术学院" value="cs" /><el-option label="经济管理学院" value="em" /><el-option label="外国语学院" value="fl" /></el-select></el-form-item>
                <el-form-item label="学号"><el-input v-model="profile.studentId" disabled /></el-form-item>
                <el-form-item label="年级"><el-select v-model="profile.grade" style="width:100%"><el-option label="2023级" value="2023" /><el-option label="2024级" value="2024" /><el-option label="2025级" value="2025" /></el-select></el-form-item>
              </div>
              <el-form-item label="微信"><el-input v-model="profile.wechat" placeholder="方便他人联系你" /></el-form-item>
              <el-button type="primary" @click="saveProfile">保存修改</el-button>
            </el-form>
          </div>

          <!-- 安全设置 -->
          <div class="main-card">
            <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;">🔒 安全设置</h3>
            <el-form label-position="top" size="large">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <el-form-item label="当前密码"><el-input v-model="security.currentPwd" type="password" show-password /></el-form-item>
                <el-form-item label=""></el-form-item>
                <el-form-item label="新密码"><el-input v-model="security.newPwd" type="password" show-password /></el-form-item>
                <el-form-item label="确认新密码"><el-input v-model="security.confirmPwd" type="password" show-password /></el-form-item>
              </div>
              <el-button type="primary" @click="changePwd">修改密码</el-button>
            </el-form>
          </div>

          <!-- 通知设置 -->
          <div class="main-card">
            <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;">🔔 通知设置</h3>
            <div style="display:flex;flex-direction:column;gap:12px;">
              <div style="display:flex;justify-content:space-between;align-items:center;"><span>新消息提醒</span><el-switch v-model="notify.msg" /></div>
              <div style="display:flex;justify-content:space-between;align-items:center;"><span>交易状态更新</span><el-switch v-model="notify.trade" /></div>
              <div style="display:flex;justify-content:space-between;align-items:center;"><span>拼单进度通知</span><el-switch v-model="notify.group" /></div>
              <div style="display:flex;justify-content:space-between;align-items:center;"><span>系统通知</span><el-switch v-model="notify.system" /></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp } = Vue
    const app = createApp({
      data() {
        return {
          profile: { nickname:'计算机学院小明', dept:'cs', studentId:'2024001', grade:'2023', wechat:'xiaoyuan123' },
          security: { currentPwd:'', newPwd:'', confirmPwd:'' },
          notify: { msg:true, trade:true, group:true, system:true },
        }
      },
      methods: {
        saveProfile() { this.$message.success('资料已保存'); },
        changePwd() { if (!this.security.newPwd) { this.$message.warning('请输入新密码'); return; } if (this.security.newPwd !== this.security.confirmPwd) { this.$message.error('两次密码不一致'); return; } this.$message.success('密码已修改'); this.security = { currentPwd:'', newPwd:'', confirmPwd:'' }; },
      }
    })
    app.use(ElementPlus)
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) { app.component(key, component) }
    app.mount('#app')
  </script>
</body>
</html>

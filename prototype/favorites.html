<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 — 校园轻集市</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F5F7FA; color: #303133; }
    .app-header { height: 60px; background: #fff; border-bottom: 1px solid #E4E7ED; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand .logo { font-size: 20px; font-weight: 700; color: #303133; text-decoration: none; }
    .brand .slogan { font-size: 13px; color: #909399; }
    .nav-links { display: flex; gap: 24px; align-items: center; list-style: none; }
    .nav-links a { text-decoration: none; color: #606266; font-size: 14px; }
    .nav-links a:hover { color: #409EFF; }
    .nav-publish { padding: 6px 18px; background: #409EFF; color: #fff !important; border-radius: 8px; font-weight: 600; }
    .main-container { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; }
    .side-card { background: #fff; border-radius: 12px; border: 1px solid #E4E7ED; overflow: hidden; }
    .user-header { padding: 28px 24px; text-align: center; background: linear-gradient(135deg, #ECF5FF, #F0F7FF); }
    .user-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #409EFF; margin-bottom: 12px; }
    .side-menu { padding: 8px 0; }
    .side-menu a { display: flex; align-items: center; gap: 10px; padding: 12px 24px; text-decoration: none; color: #606266; font-size: 14px; }
    .side-menu a:hover, .side-menu a.active { background: #ECF5FF; color: #409EFF; }
    .main-card { background: #fff; border-radius: 12px; border: 1px solid #E4E7ED; padding: 24px; }
    .fav-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid #F0F2F5; align-items: center; }
    .fav-img { width: 80px; height: 64px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #F0F2F5; }
    .fav-info { flex: 1; }
    .fav-info .fav-title { font-size: 15px; font-weight: 500; text-decoration: none; color: #303133; }
    .fav-info .fav-title:hover { color: #409EFF; }
    .fav-meta { display: flex; gap: 10px; margin-top: 4px; font-size: 12px; color: #909399; }
    .fav-price { font-size: 16px; font-weight: 700; color: #E6A23C; }
    @media (max-width: 768px) { .profile-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand"><a href="home.html" class="logo">🎓 校园轻集市</a><span class="slogan">轻量、可信、面向校园生活</span></div>
      <ul class="nav-links">
        <li><a href="home.html">首页</a></li><li><a href="category.html">分类浏览</a></li>
        <li><a href="messages.html">消息<el-badge :value="3" :max="99" style="margin-left:2px;"/></a></li>
        <li><a href="profile.html">我的</a></li>
        <li><a href="publish.html" class="nav-publish">✍️ 发布信息</a></li>
      </ul>
    </header>

    <main class="main-container">
      <el-breadcrumb separator="/" style="margin-bottom:20px;">
        <el-breadcrumb-item :to="{ path: 'home.html' }">首页</el-breadcrumb-item>
        <el-breadcrumb-item :to="{ path: 'profile.html' }">个人中心</el-breadcrumb-item>
        <el-breadcrumb-item>我的收藏</el-breadcrumb-item>
      </el-breadcrumb>

      <div class="profile-layout">
        <aside>
          <div class="side-card">
            <div class="user-header">
              <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=160" class="user-avatar" />
              <div style="font-size:18px;font-weight:700;">计算机学院小明</div>
              <div style="font-size:12px;color:#909399;">共收藏 15 条</div>
            </div>
            <div class="side-menu">
              <a href="profile.html"><el-icon><User /></el-icon>个人主页</a>
              <a href="my-posts.html"><el-icon><List /></el-icon>我的发布</a>
              <a href="favorites.html" class="active"><el-icon><Star /></el-icon>我的收藏</a>
              <a href="settings.html"><el-icon><Setting /></el-icon>账号设置</a>
            </div>
          </div>
        </aside>

        <div class="main-card">
          <h3 style="margin-bottom:16px;">⭐ 我的收藏</h3>
          <div v-for="f in favorites" :key="f.id" class="fav-item">
            <img :src="f.image" class="fav-img" @error="e => e.target.style.display='none'" />
            <div class="fav-info">
              <a :href="f.link" class="fav-title">{{ f.title }}</a>
              <div class="fav-meta">
                <span>{{ f.category }}</span>
                <span>{{ f.location }}</span>
                <span :style="{ color: f.statusColor }">{{ f.status }}</span>
                <span>收藏于 {{ f.favDate }}</span>
              </div>
            </div>
            <span class="fav-price" style="margin-right:12px;">{{ f.price }}</span>
            <el-button size="small" type="danger" plain @click="unfav(f)">取消收藏</el-button>
          </div>
          <el-empty v-if="favorites.length === 0" description="还没有收藏任何内容" />
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp } = Vue
    const app = createApp({
      data() {
        return {
          favorites: [
            { id:1, title:'二手山地自行车 — 毕业低价出', category:'二手交易', location:'西区3栋', status:'在售', statusColor:'#67C23A', price:'¥680', favDate:'6月28日', image:'https://images.unsplash.com/photo-1485965120184-e220f721d03e?w=160', link:'item-detail.html' },
            { id:2, title:'小米台灯1S — 护眼LED学习灯', category:'二手交易', location:'南门咖啡厅', status:'在售', statusColor:'#67C23A', price:'¥80', favDate:'6月28日', image:'https://images.unsplash.com/photo-1507473885765-e6ed057ab6fe?w=160', link:'item-detail.html' },
            { id:3, title:'当季樱桃拼单 — 5斤装', category:'拼单搭子', location:'北门', status:'拼单中', statusColor:'#E6A23C', price:'¥108', favDate:'6月29日', image:'https://images.unsplash.com/photo-1528821128474-27f963b062bf?w=160', link:'group-detail.html' },
            { id:4, title:'遗失 AirPods Pro 充电盒', category:'失物招领', location:'操场', status:'未解决', statusColor:'#E6A23C', price:'—', favDate:'6月27日', image:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=160', link:'lost-detail.html' },
          ],
        }
      },
      methods: {
        unfav(f) { this.$confirm('确定取消收藏？').then(() => { this.favorites = this.favorites.filter(x => x.id !== f.id); this.$message.success('已取消收藏'); }).catch(() => {}) }
      }
    })
    app.use(ElementPlus)
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) { app.component(key, component) }
    app.mount('#app')
  </script>
</body>
</html>

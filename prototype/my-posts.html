<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的发布 — 校园轻集市</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F5F7FA; color: #303133; }
    .app-header { height: 60px; background: #fff; border-bottom: 1px solid #E4E7ED; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand .logo { font-size: 20px; font-weight: 700; color: #303133; text-decoration: none; }
    .brand .slogan { font-size: 13px; color: #909399; }
    .nav-links { display: flex; gap: 24px; align-items: center; list-style: none; }
    .nav-links a { text-decoration: none; color: #606266; font-size: 14px; }
    .nav-links a:hover { color: #409EFF; }
    .nav-publish { padding: 6px 18px; background: #409EFF; color: #fff !important; border-radius: 8px; font-weight: 600; }
    .main-container { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; }
    .side-card { background: #fff; border-radius: 12px; border: 1px solid #E4E7ED; overflow: hidden; }
    .user-header { padding: 28px 24px; text-align: center; background: linear-gradient(135deg, #ECF5FF, #F0F7FF); }
    .user-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #409EFF; margin-bottom: 12px; }
    .user-name { font-size: 20px; font-weight: 700; }
    .side-menu { padding: 8px 0; }
    .side-menu a { display: flex; align-items: center; gap: 10px; padding: 12px 24px; text-decoration: none; color: #606266; font-size: 14px; }
    .side-menu a:hover, .side-menu a.active { background: #ECF5FF; color: #409EFF; }
    .main-card { background: #fff; border-radius: 12px; border: 1px solid #E4E7ED; padding: 24px; }
    .main-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .post-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #F0F2F5; }
    .post-info { flex: 1; }
    .post-info .post-title { font-size: 15px; font-weight: 500; color: #303133; text-decoration: none; }
    .post-info .post-title:hover { color: #409EFF; }
    .post-meta { display: flex; gap: 10px; margin-top: 6px; font-size: 12px; color: #909399; }
    .post-actions { display: flex; gap: 8px; flex-shrink: 0; }
    @media (max-width: 768px) { .profile-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand"><a href="home.html" class="logo">🎓 校园轻集市</a><span class="slogan">轻量、可信、面向校园生活</span></div>
      <ul class="nav-links">
        <li><a href="home.html">首页</a></li><li><a href="category.html">分类浏览</a></li>
        <li><a href="messages.html">消息<el-badge :value="3" :max="99" style="margin-left:2px;"/></a></li>
        <li><a href="profile.html">我的</a></li>
        <li><a href="publish.html" class="nav-publish">✍️ 发布信息</a></li>
      </ul>
    </header>

    <main class="main-container">
      <el-breadcrumb separator="/" style="margin-bottom:20px;">
        <el-breadcrumb-item :to="{ path: 'home.html' }">首页</el-breadcrumb-item>
        <el-breadcrumb-item :to="{ path: 'profile.html' }">个人中心</el-breadcrumb-item>
        <el-breadcrumb-item>我的发布</el-breadcrumb-item>
      </el-breadcrumb>

      <div class="profile-layout">
        <aside>
          <div class="side-card">
            <div class="user-header">
              <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=160" class="user-avatar" />
              <div class="user-name">计算机学院小明</div>
              <div style="font-size:12px;color:#909399;">共发布 8 条信息</div>
            </div>
            <div class="side-menu">
              <a href="profile.html"><el-icon><User /></el-icon>个人主页</a>
              <a href="my-posts.html" class="active"><el-icon><List /></el-icon>我的发布</a>
              <a href="favorites.html"><el-icon><Star /></el-icon>我的收藏</a>
              <a href="settings.html"><el-icon><Setting /></el-icon>账号设置</a>
            </div>
          </div>
        </aside>

        <div class="main-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;">📦 我的发布</h3>
            <div style="display:flex;gap:8px;">
              <el-select v-model="filterCategory" placeholder="分类筛选" size="default" clearable style="width:120px;">
                <el-option label="二手交易" value="二手交易" /><el-option label="失物招领" value="失物招领" />
                <el-option label="拼单搭子" value="拼单搭子" /><el-option label="跑腿委托" value="跑腿委托" />
              </el-select>
              <el-select v-model="filterStatus" placeholder="状态筛选" size="default" clearable style="width:110px;">
                <el-option label="进行中" value="进行中" /><el-option label="已完成" value="已完成" />
              </el-select>
            </div>
          </div>

          <div v-for="p in filteredPosts" :key="p.id" class="post-item">
            <div class="post-info">
              <a :href="p.link" class="post-title">{{ p.title }}</a>
              <div class="post-meta">
                <span>{{ p.category }}</span>
                <span>{{ p.date }}</span>
                <span :style="{ color: p.statusColor }">{{ p.status }}</span>
              </div>
            </div>
            <div class="post-actions">
              <el-button size="small" @click="editPost(p)">编辑</el-button>
              <el-button size="small" type="danger" plain @click="deletePost(p)">删除</el-button>
            </div>
          </div>

          <el-empty v-if="filteredPosts.length === 0" description="暂无发布记录" />
          <div style="text-align:center;margin-top:20px;">
            <el-pagination background layout="prev, pager, next" :total="totalPosts" :page-size="5" />
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp } = Vue
    const app = createApp({
      data() {
        return {
          filterCategory: '', filterStatus: '',
          posts: [
            { id:1, title:'九成新 iPad Air — 考研结束出', category:'二手交易', date:'2026-06-27', status:'在售', statusColor:'#67C23A', link:'item-detail.html' },
            { id:2, title:'考研数学复习全书（李永乐全套）', category:'二手交易', date:'2026-06-28', status:'已售', statusColor:'#909399', link:'item-detail.html' },
            { id:3, title:'IKBC 机械键盘 C87 — 红轴', category:'二手交易', date:'2026-06-29', status:'在售', statusColor:'#67C23A', link:'item-detail.html' },
            { id:4, title:'校园网半年套餐拼单 — 找室友', category:'拼单搭子', date:'2026-06-29', status:'进行中', statusColor:'#E6A23C', link:'group-detail.html' },
            { id:5, title:'帮取快递到宿舍楼下', category:'跑腿委托', date:'2026-06-27', status:'待接单', statusColor:'#E6A23C', link:'task-detail.html' },
            { id:6, title:'捡到 U 盘 — 二食堂餐桌', category:'失物招领', date:'2026-06-28', status:'未解决', statusColor:'#E6A23C', link:'lost-detail.html' },
          ],
        }
      },
      computed: {
        filteredPosts() {
          let list = this.posts
          if (this.filterCategory) list = list.filter(p => p.category === this.filterCategory)
          if (this.filterStatus) list = list.filter(p => p.status === this.filterStatus)
          return list
        },
        totalPosts() { return this.filteredPosts.length },
      },
      methods: {
        editPost(p) { this.$message.info('编辑功能（演示）: ' + p.title) },
        deletePost(p) {
          this.$confirm('确定要删除"' + p.title + '"吗？', '确认删除', { confirmButtonText: '删除', cancelButtonText: '取消', type: 'warning' })
            .then(() => { this.posts = this.posts.filter(x => x.id !== p.id); this.$message.success('已删除'); })
            .catch(() => {})
        },
      }
    })
    app.use(ElementPlus)
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) { app.component(key, component) }
    app.mount('#app')
  </script>
</body>
</html>

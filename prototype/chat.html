<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天详情 — 校园轻集市</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F5F7FA; color: #303133; }
    .app-header { height: 60px; background: #fff; border-bottom: 1px solid #E4E7ED; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand .logo { font-size: 20px; font-weight: 700; color: #303133; text-decoration: none; }
    .brand .slogan { font-size: 13px; color: #909399; }
    .nav-links { display: flex; gap: 24px; align-items: center; list-style: none; }
    .nav-links a { text-decoration: none; color: #606266; font-size: 14px; }
    .nav-links a:hover { color: #409EFF; }
    .nav-publish { padding: 6px 18px; background: #409EFF; color: #fff !important; border-radius: 8px; font-weight: 600; }
    .main-container { max-width: 800px; margin: 0 auto; padding: 24px; }
    .chat-card { background: #fff; border-radius: 12px; border: 1px solid #E4E7ED; display: flex; flex-direction: column; height: calc(100vh - 140px); }
    .chat-top { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid #F0F2F5; }
    .chat-top img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .chat-top h3 { font-size: 16px; font-weight: 600; flex: 1; }
    .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .msg-row { display: flex; gap: 10px; max-width: 80%; }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.other { align-self: flex-start; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .msg-row.mine .msg-bubble { background: #409EFF; color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.other .msg-bubble { background: #F0F2F5; color: #303133; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 11px; color: #C0C4CC; margin-top: 4px; text-align: center; }
    .relate-card { margin: 8px 0; padding: 12px; background: #F5F7FA; border-radius: 8px; border: 1px solid #E4E7ED; display: flex; gap: 10px; text-decoration: none; color: inherit; }
    .relate-card img { width: 52px; height: 44px; border-radius: 4px; object-fit: cover; }
    .relate-info h4 { font-size: 13px; font-weight: 600; }
    .relate-info span { font-size: 12px; color: #909399; }
    .chat-bottom { padding: 12px 20px; border-top: 1px solid #F0F2F5; display: flex; gap: 10px; align-items: center; }
    .quick-replies { display: flex; gap: 6px; padding: 8px 20px; flex-wrap: wrap; }
    .quick-reply { padding: 4px 12px; border: 1px solid #DCDFE6; border-radius: 14px; font-size: 12px; color: #606266; cursor: pointer; transition: all 0.2s; background: #fff; }
    .quick-reply:hover { border-color: #409EFF; color: #409EFF; background: #ECF5FF; }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand"><a href="home.html" class="logo">🎓 校园轻集市</a><span class="slogan">轻量、可信、面向校园生活</span></div>
      <ul class="nav-links">
        <li><a href="home.html">首页</a></li><li><a href="category.html">分类浏览</a></li>
        <li><a href="messages.html">消息<el-badge :value="3" :max="99" style="margin-left:2px;"/></a></li>
        <li><a href="profile.html">我的</a></li>
        <li><a href="publish.html" class="nav-publish">✍️ 发布信息</a></li>
      </ul>
    </header>

    <main class="main-container">
      <el-breadcrumb separator="/" style="margin-bottom:16px;">
        <el-breadcrumb-item :to="{ path: 'home.html' }">首页</el-breadcrumb-item>
        <el-breadcrumb-item :to="{ path: 'messages.html' }">消息</el-breadcrumb-item>
        <el-breadcrumb-item>{{ contact.name }}</el-breadcrumb-item>
      </el-breadcrumb>

      <div class="chat-card">
        <!-- 对方信息 -->
        <div class="chat-top">
          <a href="messages.html" style="text-decoration:none;color:#909399;font-size:18px;">←</a>
          <img :src="contact.avatar" @error="e => e.target.style.display='none'" />
          <div>
            <h3>{{ contact.name }}</h3>
            <span style="font-size:12px;color:#67C23A;">在线</span>
          </div>
        </div>

        <!-- 聊天记录 -->
        <div class="chat-body">
          <div class="msg-time">今天 10:30</div>

          <div class="msg-row other">
            <img :src="contact.avatar" class="msg-avatar" @error="e => e.target.style.display='none'" />
            <div>
              <div class="msg-bubble">你好！在校园轻集市看到你发布的 iPad Air，请问还在吗？</div>
            </div>
          </div>

          <!-- 关联的商品卡片 -->
          <a href="item-detail.html" class="relate-card" style="max-width:70%;margin-left:46px;">
            <img src="https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=100" />
            <div class="relate-info">
              <h4>九成新 iPad Air — 考研结束出</h4>
              <span>¥3,200 · 在售</span>
            </div>
          </a>

          <div class="msg-row mine">
            <div class="msg-bubble">在的，考研上岸了闲置出售。几乎全新，带保护壳和充电器。</div>
          </div>

          <div class="msg-row other">
            <img :src="contact.avatar" class="msg-avatar" @error="e => e.target.style.display='none'" />
            <div class="msg-bubble">方便看一下实物吗？我下午在图书馆，可以面交。</div>
          </div>

          <div class="msg-row mine">
            <div class="msg-bubble">没问题！下午3点图书馆一楼见？我带iPad过去。</div>
          </div>

          <div class="msg-row other">
            <img :src="contact.avatar" class="msg-avatar" @error="e => e.target.style.display='none'" />
            <div class="msg-bubble">好的，3点图书馆一楼见！</div>
          </div>
        </div>

        <!-- 快捷回复 -->
        <div class="quick-replies">
          <button v-for="qr in quickReplies" :key="qr" class="quick-reply" @click="input = qr">{{ qr }}</button>
        </div>

        <!-- 输入区 -->
        <div class="chat-bottom">
          <el-input v-model="input" placeholder="输入消息…" size="large" clearable @keyup.enter="send" />
          <el-button type="primary" size="large" @click="send">发送</el-button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp } = Vue
    const app = createApp({
      data() {
        return {
          input: '',
          contact: { name:'计算机学院小明', avatar:'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80' },
          quickReplies: ['还在的', '可以面交', '价格可以商量', '好的，没问题', '加微信聊吧', '今天下午方便'],
        }
      },
      methods: {
        send() { if (this.input.trim()) { this.$message.success('消息已发送（演示）'); this.input = ''; } }
      }
    })
    app.use(ElementPlus); app.mount('#app')
  </script>
</body>
</html>
